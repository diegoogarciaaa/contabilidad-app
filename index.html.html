<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contabilidad · Ledger</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f0e;
      --surface:   #141714;
      --card:      #1b1e1b;
      --border:    #252825;
      --accent:    #b5f23c;
      --accent2:   #3cf28a;
      --danger:    #f23c4a;
      --muted:     #566056;
      --text:      #e8ede8;
      --text-dim:  #8a9c8a;
      --income:    #3cf28a;
      --expense:   #f23c4a;
      --radius:    12px;
      --transition: .22s cubic-bezier(.4,0,.2,1);
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -180px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 480px;
      background: radial-gradient(ellipse, rgba(181,242,60,.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3.5rem 0 2.5rem;
      text-align: center;
    }

    .logo-mark {
      width: 46px; height: 46px;
      border: 2px solid var(--accent);
      border-radius: 10px;
      display: grid;
      place-items: center;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
    }
    .logo-mark::after {
      content: '₿';
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--accent);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }
    h1 em {
      color: var(--accent);
      font-style: italic;
    }

    .subtitle {
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-top: .6rem;
    }

    /* ── BALANCE CARD ── */
    .balance-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .balance-item {
      background: var(--card);
      padding: 1.4rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: .3rem;
      transition: background var(--transition);
    }
    .balance-item:hover { background: #1e221e; }

    .balance-label {
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .balance-value {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 400;
      line-height: 1;
    }

    .balance-value.total  { color: var(--text); }
    .balance-value.income { color: var(--income); }
    .balance-value.expense{ color: var(--expense); }
    .balance-value.negative { color: var(--expense); }

    /* ── FORM ── */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      margin-bottom: 2rem;
    }

    .panel-title {
      font-size: .65rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 130px 1fr 130px auto;
      gap: .75rem;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    label {
      font-size: .63rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    select, input[type="text"], input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: .85rem;
      padding: .65rem .85rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      width: 100%;
      appearance: none;
    }

    select:focus, input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(181,242,60,.1);
    }

    select option { background: var(--surface); }

    /* Type selector styled */
    .type-select-wrap { position: relative; }
    .type-select-wrap::after {
      content: '▾';
      position: absolute;
      right: .8rem; top: 50%; transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: .75rem;
    }

    .btn-add {
      background: var(--accent);
      color: #0d0f0e;
      border: none;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .08em;
      padding: .65rem 1.2rem;
      cursor: pointer;
      white-space: nowrap;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      align-self: end;
    }
    .btn-add:hover {
      background: #c8ff4a;
      box-shadow: 0 0 20px rgba(181,242,60,.3);
      transform: translateY(-1px);
    }
    .btn-add:active { transform: translateY(0); }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: .5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .4rem .85rem;
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0f0e;
    }

    /* ── TRANSACTIONS LIST ── */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .tx-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 1rem;
      transition: background var(--transition), transform var(--transition);
      animation: slideIn .3s cubic-bezier(.4,0,.2,1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tx-item:hover { background: #1e221e; transform: translateX(3px); }

    .tx-type-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tx-type-dot.income  { background: var(--income); box-shadow: 0 0 8px var(--income); }
    .tx-type-dot.expense { background: var(--expense); box-shadow: 0 0 8px var(--expense); }

    .tx-info { min-width: 0; }
    .tx-desc {
      font-size: .88rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-date {
      font-size: .62rem;
      color: var(--muted);
      margin-top: .2rem;
      letter-spacing: .06em;
    }

    .tx-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem;
      white-space: nowrap;
    }
    .tx-amount.income  { color: var(--income); }
    .tx-amount.expense { color: var(--expense); }

    .btn-delete {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      border-radius: 6px;
      width: 30px; height: 30px;
      display: grid; place-items: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .btn-delete:hover {
      border-color: var(--expense);
      color: var(--expense);
      background: rgba(242,60,74,.08);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: .8rem; opacity: .5; }
    .empty p { font-size: .8rem; letter-spacing: .06em; line-height: 1.7; }

    /* Clear all button */
    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: .63rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .4rem .8rem;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-clear:hover {
      border-color: var(--expense);
      color: var(--expense);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: .8rem 1.2rem;
      font-size: .78rem;
      color: var(--accent);
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      z-index: 100;
      animation: toastIn .3s ease, toastOut .3s ease 1.7s forwards;
    }
    @keyframes toastIn  { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }
    @keyframes toastOut { to { opacity:0; transform: translateY(12px); } }

    /* Responsive */
    @media (max-width: 620px) {
      .form-row {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }
      .field:nth-child(3) { grid-column: 1; }
      .btn-add            { grid-column: 2; }
      .balance-grid       { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo-mark"></div>
    <h1>Led<em>ger</em></h1>
    <p class="subtitle">Contabilidad personal · 2026</p>
  </header>

  <!-- Balance Summary -->
  <div class="balance-grid">
    <div class="balance-item">
      <span class="balance-label">Balance total</span>
      <span class="balance-value total" id="balance">$0.00</span>
    </div>
    <div class="balance-item">
      <span class="balance-label">Ingresos</span>
      <span class="balance-value income" id="total-income">+$0.00</span>
    </div>
    <div class="balance-item">
      <span class="balance-label">Gastos</span>
      <span class="balance-value expense" id="total-expense">-$0.00</span>
    </div>
  </div>

  <!-- Form -->
  <div class="panel">
    <p class="panel-title">Nuevo movimiento</p>
    <div class="form-row">
      <div class="field type-select-wrap">
        <label for="type">Tipo</label>
        <select id="type">
          <option value="income">Ingreso</option>
          <option value="expense">Gasto</option>
        </select>
      </div>
      <div class="field">
        <label for="description">Descripción</label>
        <input type="text" id="description" placeholder="Ej. Renta, Salario…" autocomplete="off"/>
      </div>
      <div class="field">
        <label for="amount">Monto ($)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <button class="btn-add" onclick="addTransaction()">+ Agregar</button>
    </div>
  </div>

  <!-- List -->
  <div class="panel">
    <div class="list-header">
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('income', this)">Ingresos</button>
        <button class="filter-btn" onclick="setFilter('expense', this)">Gastos</button>
      </div>
      <button class="btn-clear" onclick="clearAll()">Limpiar todo</button>
    </div>
    <div class="tx-list" id="tx-list"></div>
  </div>

</div>

<script>
  let transactions = JSON.parse(localStorage.getItem('ledger_v1') || '[]');
  let currentFilter = 'all';

  function save() {
    localStorage.setItem('ledger_v1', JSON.stringify(transactions));
  }

  function fmt(n) {
    return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', currencyDisplay: 'symbol' }).format(n);
  }

  function fmtDate(iso) {
    return new Intl.DateTimeFormat('es-MX', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }).format(new Date(iso));
  }

  function updateSummary() {
    const income  = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    const balEl = document.getElementById('balance');
    balEl.textContent = fmt(balance);
    balEl.className = 'balance-value total' + (balance < 0 ? ' negative' : '');

    document.getElementById('total-income').textContent  = '+' + fmt(income);
    document.getElementById('total-expense').textContent = '-' + fmt(expense);
  }

  function render() {
    const list = document.getElementById('tx-list');
    const filtered = currentFilter === 'all'
      ? transactions
      : transactions.filter(t => t.type === currentFilter);

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📒</div>
          <p>Sin movimientos aún.<br/>Agrega tu primer ingreso o gasto.</p>
        </div>`;
      return;
    }

    // Sort newest first
    const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));

    list.innerHTML = sorted.map(t => `
      <div class="tx-item" id="tx-${t.id}">
        <span class="tx-type-dot ${t.type}"></span>
        <div class="tx-info">
          <div class="tx-desc">${escHtml(t.description)}</div>
          <div class="tx-date">${fmtDate(t.date)}</div>
        </div>
        <span class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</span>
        <button class="btn-delete" onclick="deleteTransaction('${t.id}')" title="Eliminar">✕</button>
      </div>
    `).join('');

    updateSummary();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addTransaction() {
    const type   = document.getElementById('type').value;
    const desc   = document.getElementById('description').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);

    if (!desc) { flash('Agrega una descripción'); return; }
    if (!amount || amount <= 0) { flash('El monto debe ser mayor a cero'); return; }

    transactions.push({
      id: crypto.randomUUID(),
      type, description: desc, amount,
      date: new Date().toISOString()
    });

    save();
    document.getElementById('description').value = '';
    document.getElementById('amount').value = '';
    render();
    toast(type === 'income' ? '✓ Ingreso agregado' : '✓ Gasto registrado');
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
  }

  function clearAll() {
    if (!transactions.length) return;
    if (!confirm('¿Eliminar todos los movimientos?')) return;
    transactions = [];
    save();
    render();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2100);
  }

  function flash(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.style.borderColor = 'var(--expense)';
    el.style.color = 'var(--expense)';
    el.textContent = '⚠ ' + msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2100);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTransaction();
  });

  // Init
  render();
  updateSummary();
</script>
</body>
</html>
